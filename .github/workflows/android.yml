name: Flutter Android CI (Dynamic Full)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Application ID (e.g. com.client.app)"
        required: true
      app_name:
        description: "App Name"
        required: true
      key_alias:
        required: true
      keystore_password:
        required: true
      key_password:
        required: true
      mode:
        description: "setup or build"
        required: true
        default: build

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      APP_ID: ${{ inputs.package_name }}
      APP_NAME: ${{ inputs.app_name }}
      MODE: ${{ inputs.mode }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      # 🆕 Compute SAFE_NAME + FLAVOR_NAME early — used by all steps below
      - name: Compute flavor name
        run: |
          SAFE_NAME=$(echo "${{ inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | tr -cd 'a-z0-9_')
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV
          echo "FLAVOR_NAME=$SAFE_NAME" >> $GITHUB_ENV
          echo "KEYSTORE_PATH=android/app/${SAFE_NAME}.jks" >> $GITHUB_ENV
          echo "Flavor: $SAFE_NAME"

      # 🆕 Add new flavor block to build.gradle.kts
      - name: Add flavor to build.gradle.kts
        if: inputs.mode == 'setup'
        run: |
          FLAVOR_NAME="${{ env.FLAVOR_NAME }}"
          PACKAGE="${{ inputs.package_name }}"
          APP_NAME="${{ inputs.app_name }}"

          echo "Adding flavor: $FLAVOR_NAME ($PACKAGE)"

          if grep -q "create(\"$FLAVOR_NAME\")" android/app/build.gradle.kts; then
            echo "⚠️ Flavor $FLAVOR_NAME already exists, skipping"
          else
            # Build the new flavor block
            NEW_FLAVOR="        create(\"$FLAVOR_NAME\") {\n            dimension = \"environment\"\n            applicationId = \"$PACKAGE\"\n            resValue(\"string\", \"app_name\", \"$APP_NAME\")\n        }"

            # Insert after productFlavors {
            sed -i "/productFlavors {/a\\$NEW_FLAVOR" android/app/build.gradle.kts
            echo "✅ Flavor $FLAVOR_NAME added"
          fi

          echo "=== productFlavors section ==="
          grep -A5 "productFlavors" android/app/build.gradle.kts

      # 🔥 Update AndroidManifest label
      - name: Update Android label
        run: |
          sed -i "s/android:label=\".*\"/android:label=\"$APP_NAME\"/g" android/app/src/main/AndroidManifest.xml || true

      # 🔐 Generate keystore
      - name: Generate Keystore
        if: inputs.mode == 'setup'
        run: |
          KEYSTORE_PATH="android/app/${{ env.SAFE_NAME }}.jks"

          echo "Using keystore: $KEYSTORE_PATH"

          keytool -genkeypair \
            -v \
            -keystore "$KEYSTORE_PATH" \
            -alias "${{ inputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ inputs.keystore_password }}" \
            -keypass "${{ inputs.key_password }}" \
            -dname "CN=${{ inputs.app_name }}, OU=Dev, O=Company, L=City, S=State, C=IN"

          echo "KEYSTORE_FILE=${{ env.SAFE_NAME }}.jks" >> $GITHUB_ENV
          echo "✅ Keystore generated"

      # 🔥 Firebase CLI
      - name: Install Firebase CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          npm install -g firebase-tools

      # 🔥 Firebase Auth
      - name: Authenticate Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > firebase-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$PWD/firebase-key.json" >> $GITHUB_ENV

      # 🔥 Remove old config
      - name: Remove old firebase config
        if: inputs.mode == 'setup'
        run: rm -f android/app/google-services.json

      # 🔥 Setup Firebase App
      - name: Setup Firebase App
        if: inputs.mode == 'setup'
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          echo "Using package: $PACKAGE_NAME"

          firebase apps:list --project="$PROJECT_ID" --json > apps.json

          FIREBASE_APP_ID=$(jq -r --arg pkg "$PACKAGE_NAME" '
            .result
            | map(select(.namespace == $pkg))
            | .[0].appId
          ' apps.json)

          if [ -z "$FIREBASE_APP_ID" ] || [ "$FIREBASE_APP_ID" = "null" ]; then
            echo "App not found. Creating..."

            firebase apps:create ANDROID \
              --package-name="$PACKAGE_NAME" \
              --project="$PROJECT_ID"

            firebase apps:list --project="$PROJECT_ID" --json > apps.json

            FIREBASE_APP_ID=$(jq -r --arg pkg "$PACKAGE_NAME" '
              .result
              | map(select(.namespace == $pkg))
              | .[0].appId
            ' apps.json)
          fi

          echo "Resolved Firebase APP_ID: $FIREBASE_APP_ID"

          if [ -z "$FIREBASE_APP_ID" ] || [ "$FIREBASE_APP_ID" = "null" ]; then
            echo "❌ Failed to resolve Firebase APP_ID"
            exit 1
          fi

          firebase apps:sdkconfig ANDROID "$FIREBASE_APP_ID" \
            --project="$PROJECT_ID" > android/app/google-services.json

      # 🔥 Fix AGP 9 DSL
      - name: Fix AGP 9 DSL
        run: echo "android.newDsl=false" >> android/gradle.properties

      - name: Write signing to gradle.properties
        run: |
          PROPS_FILE="android/gradle.properties"

          sed -i '/^ANDROID_KEYSTORE/d' $PROPS_FILE
          sed -i '/^ANDROID_KEY/d' $PROPS_FILE
          sed -i '/^APP_ID/d' $PROPS_FILE
          sed -i '/^APP_NAME/d' $PROPS_FILE

          echo "ANDROID_KEYSTORE_PATH=${{ env.SAFE_NAME }}.jks" >> $PROPS_FILE
          echo "ANDROID_KEYSTORE_PASSWORD=${{ inputs.keystore_password }}" >> $PROPS_FILE
          echo "ANDROID_KEY_ALIAS=${{ inputs.key_alias }}" >> $PROPS_FILE
          echo "ANDROID_KEY_PASSWORD=${{ inputs.key_password }}" >> $PROPS_FILE
          echo "APP_ID=${{ env.APP_ID }}" >> $PROPS_FILE
          echo "APP_NAME=${{ env.APP_NAME }}" >> $PROPS_FILE

          echo "=== gradle.properties ==="
          cat $PROPS_FILE

          echo "=== Verifying keystore ==="
          ls -la android/app/*.jks || echo "❌ No .jks found"

      # ⚙️ Build — 🆕 uses FLAVOR_NAME instead of hardcoded dynamic
      - name: Build AppBundle
        run: |
          flutter build appbundle \
            --flavor ${{ env.FLAVOR_NAME }} \
            -t lib/main.dart \
            --dart-define=FLAVOR=${{ env.FLAVOR_NAME }} \
            --android-skip-build-dependency-validation

      # 📦 Upload
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-bundle
          path: build/app/outputs/bundle/

      # 🆕 Commit — now also includes build.gradle.kts
      - name: Commit generated files
        if: inputs.mode == 'setup'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add "${{ env.KEYSTORE_PATH }}"
          git add android/app/google-services.json
          git add android/app/build.gradle.kts

          git commit -m "Add flavor ${{ env.FLAVOR_NAME }} (${{ env.APP_ID }})" || echo "No changes"
          git push