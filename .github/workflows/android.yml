name: Flutter Android CI (Dynamic Full)

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Application ID (e.g. com.client.app)"
        required: true
      app_name:
        description: "App Name"
        required: true
      key_alias:
        required: true
      keystore_password:
        required: true
      key_password:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FLAVOR: dynamic
      APP_ID: ${{ inputs.package_name }}
      APP_NAME: ${{ inputs.app_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      # 🔥 Replace package name dynamically
      - name: Update package name
        run: |
          sed -i "s/applicationId = \".*\"/applicationId = \"$APP_ID\"/g" android/app/build.gradle.kts

          find android/app/src -type f -name "*.xml" -exec sed -i "s/package=\".*\"/package=\"$APP_ID\"/g" {} +

      # 🔥 Update app name
      - name: Update app name
        run: |
          sed -i "s/<string name=\"app_name\">.*<\/string>/<string name=\"app_name\">$APP_NAME<\/string>/g" android/app/src/main/res/values/strings.xml

      # 🔐 Generate keystore
      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore android/app/upload-keystore.jks \
            -alias "${{ inputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ inputs.keystore_password }}" \
            -keypass "${{ inputs.key_password }}" \
            -dname "CN=${{ inputs.app_name }}, OU=Dev, O=Company, L=City, S=State, C=IN"

      # 🔥 Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > firebase-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=firebase-key.json

      # 🔥 Remove old config
      - name: Remove old firebase config
        run: rm -f android/app/google-services.json

      # 🔥 Create + Fetch Firebase config
      - name: Setup Firebase App
        run: |
          PACKAGE=${{ inputs.package_name }}
          PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}

          echo "Checking Firebase app..."

          APP_ID=$(firebase apps:list --project=$PROJECT_ID | grep $PACKAGE | awk '{print $1}')

          if [ -z "$APP_ID" ]; then
            echo "Creating Firebase app..."
            firebase apps:create ANDROID $PACKAGE \
              --project=$PROJECT_ID \
              --display-name="${{ inputs.app_name }}"

            APP_ID=$(firebase apps:list --project=$PROJECT_ID | grep $PACKAGE | awk '{print $1}')
          fi

          echo "Downloading google-services.json..."
          firebase apps:sdkconfig ANDROID $APP_ID \
            --project=$PROJECT_ID > android/app/google-services.json

      # ⚙️ Build
      - name: Build AppBundle
        run: |
          flutter build appbundle \
            --flavor $FLAVOR \
            -t lib/main.dart \
            --dart-define=FLAVOR=$FLAVOR

        env:
          ANDROID_KEYSTORE_PATH: android/app/upload-keystore.jks
          ANDROID_KEY_ALIAS: ${{ inputs.key_alias }}
          ANDROID_KEY_PASSWORD: ${{ inputs.key_password }}
          ANDROID_KEYSTORE_PASSWORD: ${{ inputs.keystore_password }}

          ORG_GRADLE_PROJECT_APP_ID: ${{ env.APP_ID }}
          ORG_GRADLE_PROJECT_APP_NAME: ${{ env.APP_NAME }}

      # 📦 Upload
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-bundle
          path: build/app/outputs/bundle/