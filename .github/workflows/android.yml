name: Flutter Android CI (Dynamic)

on:
  workflow_dispatch:
    inputs:
      package_name:
        required: true
      app_name:
        required: true
      key_alias:
        required: true
      keystore_password:
        required: true
      key_password:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FLAVOR: dynamic
      APP_ID: ${{ inputs.package_name }}
      APP_NAME: ${{ inputs.app_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      # 🔐 Generate keystore automatically (no secrets needed)
      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore android/app/upload-keystore.jks \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.event.inputs.keystore_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=${{ github.event.inputs.app_name }}, OU=Dev, O=Company, L=City, S=State, C=IN"

      # ⚙️ Build AAB (dynamic flavor)
      - name: Build AppBundle
        run: |
          flutter build appbundle \
            --flavor $FLAVOR \
            -t lib/main.dart \
            --dart-define=FLAVOR=$FLAVOR

        env:
          ANDROID_KEYSTORE_PATH: android/app/upload-keystore.jks
          ANDROID_KEY_ALIAS: ${{ github.event.inputs.key_alias }}
          ANDROID_KEY_PASSWORD: ${{ github.event.inputs.key_password }}
          ANDROID_KEYSTORE_PASSWORD: ${{ github.event.inputs.keystore_password }}

          # 🔥 Pass to Gradle
          ORG_GRADLE_PROJECT_FLAVOR: ${{ env.FLAVOR }}
          ORG_GRADLE_PROJECT_APP_ID: ${{ env.APP_ID }}
          ORG_GRADLE_PROJECT_APP_NAME: ${{ env.APP_NAME }}

      # 📦 Upload artifact
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-bundle
          path: build/app/outputs/bundle/