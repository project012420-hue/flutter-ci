name: Flutter Android CI (Dynamic Full)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Application ID (e.g. com.client.app)"
        required: true
      app_name:
        description: "App Name"
        required: true
      key_alias:
        required: true
      keystore_password:
        required: true
      key_password:
        required: true
      mode:
        description: "setup or build"
        required: true
        default: build

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FLAVOR: dynamic
      APP_ID: ${{ inputs.package_name }}
      APP_NAME: ${{ inputs.app_name }}
      MODE: ${{ inputs.mode }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      # 🔥 Update package name
      - name: Update package name
        run: |
          sed -i "s/applicationId = \".*\"/applicationId = \"$APP_ID\"/g" android/app/build.gradle.kts || true
          find android/app/src -type f -name "*.xml" -exec sed -i "s/package=\".*\"/package=\"$APP_ID\"/g" {} + || true

      # 🔥 Update app name
      - name: Update app name
        run: |
          FILE=android/app/src/main/res/values/strings.xml

          if [ ! -f "$FILE" ]; then
            echo "Creating strings.xml..."
            mkdir -p android/app/src/main/res/values
            cat > $FILE <<EOF
          <resources>
          <string name="app_name">$APP_NAME</string>
          </resources>
          EOF
          else
          sed -i "s/<string name=\"app_name\">.*<\/string>/<string name=\"app_name\">$APP_NAME<\/string>/g" $FILE
          fi

# 🔥 Update AndroidManifest label
      - name: Update Android label
        run: |
          sed -i "s/android:label=\".*\"/android:label=\"$APP_NAME\"/g" android/app/src/main/AndroidManifest.xml || true

# 🔐 Generate keystore
      - name: Generate Keystore
        if: inputs.mode == 'setup'
        run: |
          # Convert app name → safe file name
          SAFE_NAME=$(echo "${{ inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | tr -cd 'a-z0-9_')

          KEYSTORE_PATH="android/app/${SAFE_NAME}.jks"

          echo "Using keystore: $KEYSTORE_PATH"

          keytool -genkeypair \
            -v \
            -keystore "$KEYSTORE_PATH" \
            -alias "${{ inputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ inputs.keystore_password }}" \
            -keypass "${{ inputs.key_password }}" \
            -dname "CN=${{ inputs.app_name }}, OU=Dev, O=Company, L=City, S=State, C=IN"

          # Save for next steps
          echo "KEYSTORE_FILE=$(basename "$KEYSTORE_PATH")" >> $GITHUB_ENV
          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV

      # 🔥 Firebase CLI
      - name: Install Firebase CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          npm install -g firebase-tools

      # 🔥 Firebase Auth
      - name: Authenticate Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > firebase-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$PWD/firebase-key.json" >> $GITHUB_ENV

      # 🔥 Remove old config
      - name: Remove old firebase config
        if: inputs.mode == 'setup'
        run: rm -f android/app/google-services.json

      # 🔥 Setup Firebase App
      - name: Setup Firebase App
        if: inputs.mode == 'setup'
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          echo "Using package: $PACKAGE_NAME"

          firebase apps:list --project="$PROJECT_ID" --json > apps.json

          echo "Firebase apps response:"
          cat apps.json

          FIREBASE_APP_ID=$(jq -r --arg pkg "$PACKAGE_NAME" '
            .result
            | map(select(.namespace == $pkg))
            | .[0].appId
          ' apps.json)

          if [ -z "$FIREBASE_APP_ID" ] || [ "$FIREBASE_APP_ID" = "null" ]; then
            echo "App not found. Creating..."

            firebase apps:create ANDROID \
              --package-name="$PACKAGE_NAME" \
              --project="$PROJECT_ID"

            firebase apps:list --project="$PROJECT_ID" --json > apps.json

            FIREBASE_APP_ID=$(jq -r --arg pkg "$PACKAGE_NAME" '
              .result
              | map(select(.namespace == $pkg))
              | .[0].appId
            ' apps.json)
          fi

          echo "Resolved Firebase APP_ID: $FIREBASE_APP_ID"

          if [ -z "$FIREBASE_APP_ID" ] || [ "$FIREBASE_APP_ID" = "null" ]; then
            echo "❌ Failed to resolve Firebase APP_ID"
            exit 1
          fi

          echo "Downloading google-services.json..."

          firebase apps:sdkconfig ANDROID "$FIREBASE_APP_ID" \
            --project="$PROJECT_ID" > android/app/google-services.json
      - name: Debug keystore
        run: |
          echo "Path: $KEYSTORE_PATH"
          ls -la android/app
      - name: Compute keystore name
        run: |
          SAFE_NAME=$(echo "${{ inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | tr -cd 'a-z0-9_')
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV
          echo "KEYSTORE_PATH=android/app/${SAFE_NAME}.jks" >> $GITHUB_ENV

      - name: Debug signing env
        run: |
          echo "KEYSTORE_PATH: '${{ env.KEYSTORE_PATH }}'"
          echo "KEY_ALIAS: '${{ inputs.key_alias }}'"
          echo "KEYSTORE_PASSWORD length: ${#ANDROID_KEYSTORE_PASSWORD}"
          ls -la android/app/*.jks || echo "❌ No .jks found"
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ inputs.keystore_password }}
      # ⚙️ Build
      - name: Build AppBundle
        run: |
          flutter build appbundle \
            --flavor $FLAVOR \
            -t lib/main.dart \
            --dart-define=FLAVOR=$FLAVOR
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.KEYSTORE_FILE}} #ANDROID_KEYSTORE_PATH: ${{ env.KEYSTORE_FILE }} # FILE
          ANDROID_KEY_ALIAS: ${{ inputs.key_alias }}
          ANDROID_KEY_PASSWORD: ${{ inputs.key_password }}
          ANDROID_KEYSTORE_PASSWORD: ${{ inputs.keystore_password }}
          ORG_GRADLE_PROJECT_APP_ID: ${{ env.APP_ID }}
          ORG_GRADLE_PROJECT_APP_NAME: ${{ env.APP_NAME }}

      # 📦 Upload
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-bundle
          path: build/app/outputs/bundle/

      - name: Commit generated files
        if: inputs.mode == 'setup'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "Adding keystore: $KEYSTORE_PATH"

          git add "$KEYSTORE_PATH"
          git add android/app/google-services.json

          git commit -m "Auto add keystore ($KEYSTORE_PATH) + firebase for $APP_ID" || echo "No changes"

          git push